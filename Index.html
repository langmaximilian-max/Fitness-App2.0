<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainingslog</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0e; --surface: #181818; --card: #1e1e1e; --border: #2a2a2a;
  --accent: #c8f135; --accent2: #8bc34a; --text: #f0f0f0; --muted: #666; --danger: #ff4c4c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 90px; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; }
header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 2px; color: var(--accent); line-height: 1; }
header p { font-size: 0.72rem; color: var(--muted); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
.nav-btn { flex: 1; background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.65rem; font-weight: 600; padding: 10px 4px 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.2s; }
.nav-btn .nav-icon { font-size: 1.3rem; }
.nav-btn.active { color: var(--accent); }

.page { display: none; padding: 16px 16px 0; }
.page.active { display: block; }
.section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 14px; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; background: var(--surface); cursor: pointer; }
.card-title { font-weight: 600; font-size: 0.9rem; }
.card-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
.badge { background: var(--accent); color: #000; font-size: 0.68rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; }

.ex-table { padding: 10px 14px 14px; }
.ex-table-header { display: grid; grid-template-columns: 1fr 58px 58px 40px 30px; gap: 6px; padding-bottom: 6px; }
.col-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
.col-label:first-child { text-align: left; }
.ex-row { display: grid; grid-template-columns: 1fr 58px 58px 40px 30px; gap: 6px; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
.ex-row:last-of-type { border-bottom: none; }
.ex-row input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.83rem; padding: 5px 6px; width: 100%; text-align: center; }
.ex-row input:focus { outline: none; border-color: var(--accent); }
.ex-row input.name-input { text-align: left; }
.btn-icon { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 3px; border-radius: 4px; transition: color 0.2s; display: flex; align-items: center; justify-content: center; }
.btn-icon:hover { color: var(--danger); }
.set-num { text-align: center; color: var(--muted); font-size: 0.78rem; }

.add-ex-btn { display: flex; align-items: center; justify-content: center; gap: 6px; background: none; border: 1px dashed var(--border); border-radius: 8px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; padding: 8px 14px; cursor: pointer; margin-top: 10px; width: 100%; transition: all 0.2s; }
.add-ex-btn:hover { border-color: var(--accent); color: var(--accent); }
.primary-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 700; padding: 13px; width: 100%; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
.primary-btn:hover { opacity: 0.85; }

.empty-state { text-align: center; padding: 36px 20px; color: var(--muted); }
.empty-state .icon { font-size: 2.6rem; margin-bottom: 10px; }
.empty-state p { font-size: 0.88rem; line-height: 1.6; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 5px; }
.stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: var(--accent); line-height: 1; }
.stat-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
.ep-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 13px; margin-bottom: 9px; }
.ep-name { font-weight: 600; font-size: 0.88rem; margin-bottom: 7px; }
.ep-bar-bg { background: var(--border); border-radius: 4px; height: 5px; margin-bottom: 5px; overflow: hidden; }
.ep-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 4px; transition: width 0.6s ease; }
.ep-meta { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); }
.ep-meta span:last-child { color: var(--accent); font-weight: 600; }

.plan-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
.plan-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; background: var(--surface); }
.plan-start-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 700; padding: 6px 12px; cursor: pointer; }
.plan-ex-builder { padding: 10px 14px 14px; }
.plan-ex-row { display: grid; grid-template-columns: 1fr 50px 50px 24px; gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
.plan-ex-row:last-of-type { border-bottom: none; }
.plan-ex-row input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.83rem; padding: 5px 6px; width: 100%; text-align: center; }
.plan-ex-row input:focus { outline: none; border-color: var(--accent); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 16px 36px; width: 100%; border-top: 1px solid var(--border); animation: slideUp 0.28s ease; max-height: 90vh; overflow-y: auto; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 14px; }
.modal input, .modal select { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; padding: 11px 13px; margin-bottom: 10px; }
.modal input:focus, .modal select:focus { outline: none; border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 4px; }
.btn-cancel { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; }
.btn-confirm { flex: 2; padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 700; cursor: pointer; }

.picker-search { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 10px 13px; margin-bottom: 10px; }
.picker-search:focus { outline: none; border-color: var(--accent); }
.muscle-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.muscle-tab { background: var(--card); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600; padding: 5px 12px; cursor: pointer; transition: all 0.2s; }
.muscle-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }
.ex-pick-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
.ex-pick-item { display: flex; justify-content: space-between; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; cursor: pointer; transition: all 0.18s; }
.ex-pick-item.selected { border-color: var(--accent); background: rgba(200,241,53,0.07); }
.pick-name { font-size: 0.88rem; font-weight: 500; }
.pick-muscle { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
.pick-check { font-size: 1.1rem; color: var(--border); transition: color 0.2s; }
.ex-pick-item.selected .pick-check { color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Trainingslog</h1>
  <p>Pläne · Log · Fortschritt</p>
</header>

<div id="page-log" class="page active">
  <div class="section-title">Trainings</div>
  <div id="workout-list"></div>
  <button class="primary-btn" onclick="openNewWorkoutModal()">＋ Neues Training</button>
</div>

<div id="page-plans" class="page">
  <div class="section-title">Meine Pläne</div>
  <div id="plan-list"></div>
  <button class="primary-btn" onclick="openNewPlanModal()">＋ Neuen Plan erstellen</button>
</div>

<div id="page-stats" class="page">
  <div class="section-title">Fortschritt</div>
  <div class="stats-grid" id="stats-grid"></div>
  <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;">Übungsfortschritt</div>
  <div id="exercise-progress-list"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('log')" id="nav-log"><span class="nav-icon">📋</span>Log</button>
  <button class="nav-btn" onclick="switchTab('plans')" id="nav-plans"><span class="nav-icon">📅</span>Pläne</button>
  <button class="nav-btn" onclick="switchTab('stats')" id="nav-stats"><span class="nav-icon">📊</span>Stats</button>
</div>

<!-- WORKOUT MODAL -->
<div class="modal-overlay" id="modal-workout">
  <div class="modal">
    <h2>Neues Training</h2>
    <input type="text" id="wk-name" placeholder="Name (z.B. Push, Pull, Beine)">
    <input type="date" id="wk-date">
    <select id="wk-plan-select"><option value="">— Plan laden (optional) —</option></select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-workout')">Abbrechen</button>
      <button class="btn-confirm" onclick="createWorkout()">Starten</button>
    </div>
  </div>
</div>

<!-- PLAN MODAL -->
<div class="modal-overlay" id="modal-plan">
  <div class="modal">
    <h2>Neuer Plan</h2>
    <input type="text" id="plan-name-input" placeholder="Planname (z.B. Push A, Beine)">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-plan')">Abbrechen</button>
      <button class="btn-confirm" onclick="createPlan()">Erstellen</button>
    </div>
  </div>
</div>

<!-- EXERCISE PICKER -->
<div class="modal-overlay" id="modal-picker">
  <div class="modal">
    <h2>Übung wählen</h2>
    <input type="text" class="picker-search" id="picker-search" placeholder="Suchen..." oninput="renderPickerList()">
    <div class="muscle-tabs" id="muscle-tabs"></div>
    <div class="ex-pick-list" id="ex-pick-list"></div>
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn-cancel" onclick="closeModal('modal-picker')">Abbrechen</button>
      <button class="btn-confirm" onclick="confirmPick()">Hinzufügen</button>
    </div>
  </div>
</div>

<script>
const EXERCISES = [
  {name:'Bankdrücken',muscle:'Brust'},{name:'Schrägbankdrücken',muscle:'Brust'},{name:'Kurzhantel Fliegende',muscle:'Brust'},
  {name:'Kabelfliegende',muscle:'Brust'},{name:'Dips',muscle:'Brust'},{name:'Liegestütze',muscle:'Brust'},
  {name:'Klimmzüge',muscle:'Rücken'},{name:'Latzug',muscle:'Rücken'},{name:'Rudern Langhantel',muscle:'Rücken'},
  {name:'Rudern Kurzhantel',muscle:'Rücken'},{name:'Kabelrudern',muscle:'Rücken'},{name:'Kreuzheben',muscle:'Rücken'},
  {name:'Hyperextension',muscle:'Rücken'},{name:'Schulterdrücken',muscle:'Schulter'},{name:'Seitheben',muscle:'Schulter'},
  {name:'Vorgebeugtes Seitheben',muscle:'Schulter'},{name:'Face Pulls',muscle:'Schulter'},{name:'Arnold Press',muscle:'Schulter'},
  {name:'Bizepscurls Langhantel',muscle:'Bizeps'},{name:'Bizepscurls Kurzhantel',muscle:'Bizeps'},{name:'Hammercurls',muscle:'Bizeps'},
  {name:'Kabelpulls Bizeps',muscle:'Bizeps'},{name:'Konzentrationscurls',muscle:'Bizeps'},{name:'Trizepsdrücken Kabel',muscle:'Trizeps'},
  {name:'Skull Crusher',muscle:'Trizeps'},{name:'Trizeps Dips',muscle:'Trizeps'},{name:'Overhead Extension',muscle:'Trizeps'},
  {name:'Close Grip Bench',muscle:'Trizeps'},{name:'Kniebeugen',muscle:'Beine'},{name:'Beinpresse',muscle:'Beine'},
  {name:'Ausfallschritte',muscle:'Beine'},{name:'Rumänisches Kreuzheben',muscle:'Beine'},{name:'Beinbeuger',muscle:'Beine'},
  {name:'Beinstrecker',muscle:'Beine'},{name:'Wadenheben',muscle:'Beine'},{name:'Plank',muscle:'Core'},
  {name:'Crunch',muscle:'Core'},{name:'Russian Twist',muscle:'Core'},{name:'Beinheben',muscle:'Core'},{name:'Ab Rollout',muscle:'Core'}
];
const MUSCLES = ['Alle',...new Set(EXERCISES.map(e=>e.muscle))];

let workouts = JSON.parse(localStorage.getItem('tlog_workouts')||'[]');
let plans = JSON.parse(localStorage.getItem('tlog_plans')||'[]');
function save() {
  localStorage.setItem('tlog_workouts',JSON.stringify(workouts));
  localStorage.setItem('tlog_plans',JSON.stringify(plans));
}

function switchTab(tab) {
  ['log','plans','stats'].forEach(t=>{
    document.getElementById('page-'+t).classList.toggle('active',t===tab);
    document.getElementById('nav-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='stats') renderStats();
  if(tab==='plans') renderPlans();
  if(tab==='log') renderLog();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// PICKER
let pickerCb=null, pickerSel=[], pickerMuscle='Alle';
function openPicker(cb){
  pickerCb=cb; pickerSel=[]; pickerMuscle='Alle';
  document.getElementById('picker-search').value='';
  renderMuscleTabs(); renderPickerList();
  document.getElementById('modal-picker').classList.add('open');
}
function renderMuscleTabs(){
  document.getElementById('muscle-tabs').innerHTML=MUSCLES.map(m=>
    `<button class="muscle-tab ${m===pickerMuscle?'active':''}" onclick="setPickerMuscle('${m}')">${m}</button>`
  ).join('');
}
function setPickerMuscle(m){pickerMuscle=m;renderMuscleTabs();renderPickerList();}
function renderPickerList(){
  const q=document.getElementById('picker-search').value.toLowerCase();
  const filtered=EXERCISES.filter(e=>(pickerMuscle==='Alle'||e.muscle===pickerMuscle)&&(!q||e.name.toLowerCase().includes(q)));
  document.getElementById('ex-pick-list').innerHTML=filtered.map(e=>{
    const sel=pickerSel.includes(e.name);
    return `<div class="ex-pick-item ${sel?'selected':''}" onclick="togglePick('${e.name}')">
      <div><div class="pick-name">${e.name}</div><div class="pick-muscle">${e.muscle}</div></div>
      <span class="pick-check">${sel?'✓':'○'}</span></div>`;
  }).join('')||`<div class="empty-state" style="padding:16px"><p>Keine Übungen gefunden</p></div>`;
}
function togglePick(name){
  const i=pickerSel.indexOf(name);
  if(i>=0) pickerSel.splice(i,1); else pickerSel.push(name);
  renderPickerList();
}
function confirmPick(){
  if(pickerSel.length&&pickerCb) pickerCb([...pickerSel]);
  closeModal('modal-picker');
}

// LOG
function openNewWorkoutModal(){
  document.getElementById('wk-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('wk-name').value='';
  const sel=document.getElementById('wk-plan-select');
  sel.innerHTML='<option value="">— Plan laden (optional) —</option>'+plans.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('modal-workout').classList.add('open');
}
function createWorkout(){
  const name=document.getElementById('wk-name').value.trim()||'Training';
  const date=document.getElementById('wk-date').value||new Date().toISOString().split('T')[0];
  const planId=document.getElementById('wk-plan-select').value;
  let exercises=[];
  if(planId){
    const plan=plans.find(p=>p.id==planId);
    if(plan) exercises=plan.exercises.map(e=>({
      id:Date.now()+Math.random(),name:e.name,
      sets:Array(+e.sets||3).fill(null).map(()=>({kg:'',reps:e.reps||''}))
    }));
  }
  workouts.unshift({id:Date.now(),name,date,exercises});
  save(); closeModal('modal-workout'); renderLog();
}
function addExToWorkout(wid){
  openPicker(names=>{
    const w=workouts.find(x=>x.id==wid);
    names.forEach(n=>w.exercises.push({id:Date.now()+Math.random(),name:n,sets:[{kg:'',reps:''},{kg:'',reps:''},{kg:'',reps:''}]}));
    save(); renderLog();
  });
}
function removeEx(wid,eid){
  const w=workouts.find(x=>x.id==wid);
  w.exercises=w.exercises.filter(e=>e.id!=eid);
  save(); renderLog();
}
function updateField(wid,eid,si,field,val){
  const w=workouts.find(x=>x.id==wid);
  const e=w.exercises.find(e=>e.id==eid);
  if(!e) return;
  if(field==='name') e.name=val; else e.sets[si][field]=val;
  save();
}
function deleteWorkout(wid){
  if(!confirm('Training löschen?')) return;
  workouts=workouts.filter(x=>x.id!=wid);
  save(); renderLog();
}
function toggleCard(id){
  const el=document.getElementById('card-'+id);
  if(el) el.style.display=el.style.display==='none'?'':'none';
}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});}

function renderLog(){
  const list=document.getElementById('workout-list');
  if(!workouts.length){list.innerHTML=`<div class="empty-state"><div class="icon">💪</div><p>Noch kein Training.<br>Starte oder lade einen Plan!</p></div>`;return;}
  list.innerHTML=workouts.map(w=>`
    <div class="card">
      <div class="card-header" onclick="toggleCard(${w.id})">
        <div><div class="card-title">${w.name}</div><div class="card-meta">${fmtDate(w.date)}</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge">${w.exercises.length} Üb.</span>
          <button class="btn-icon" onclick="event.stopPropagation();deleteWorkout(${w.id})">🗑</button>
        </div>
      </div>
      <div id="card-${w.id}" class="ex-table">
        <div class="ex-table-header">
          <span class="col-label">Übung</span><span class="col-label">Kg</span>
          <span class="col-label">Wdh</span><span class="col-label">Satz</span><span></span>
        </div>
        ${w.exercises.map(e=>e.sets.map((s,si)=>`
          <div class="ex-row">
            ${si===0?`<input class="name-input" value="${e.name}" placeholder="Übung..." oninput="updateField(${w.id},${e.id},'','name',this.value)">`:'<span></span>'}
            <input type="number" value="${s.kg}" placeholder="—" oninput="updateField(${w.id},${e.id},${si},'kg',this.value)">
            <input type="number" value="${s.reps}" placeholder="—" oninput="updateField(${w.id},${e.id},${si},'reps',this.value)">
            <span class="set-num">${si+1}</span>
            ${si===0?`<button class="btn-icon" onclick="removeEx(${w.id},${e.id})">✕</button>`:'<span></span>'}
          </div>`).join('')).join('')}
        <button class="add-ex-btn" onclick="addExToWorkout(${w.id})">＋ Übung hinzufügen</button>
      </div>
    </div>`).join('');
}

// PLANS
function openNewPlanModal(){document.getElementById('plan-name-input').value='';document.getElementById('modal-plan').classList.add('open');}
function createPlan(){
  const name=document.getElementById('plan-name-input').value.trim()||'Plan';
  plans.push({id:Date.now(),name,exercises:[]});
  save(); closeModal('modal-plan'); renderPlans();
}
function deletePlan(pid){
  if(!confirm('Plan löschen?')) return;
  plans=plans.filter(p=>p.id!=pid);
  save(); renderPlans();
}
function addExToPlan(pid){
  openPicker(names=>{
    const plan=plans.find(p=>p.id==pid);
    names.forEach(n=>plan.exercises.push({id:Date.now()+Math.random(),name:n,sets:3,reps:6}));
    save(); renderPlans();
  });
}
function removePlanEx(pid,eid){
  const plan=plans.find(p=>p.id==pid);
  plan.exercises=plan.exercises.filter(e=>e.id!=eid);
  save(); renderPlans();
}
function updatePlanEx(pid,eid,field,val){
  const plan=plans.find(p=>p.id==pid);
  const ex=plan.exercises.find(e=>e.id==eid);
  if(ex) ex[field]=+val;
  save();
}
function startFromPlan(pid){
  const plan=plans.find(p=>p.id==pid);
  document.getElementById('wk-name').value=plan.name;
  document.getElementById('wk-date').value=new Date().toISOString().split('T')[0];
  const sel=document.getElementById('wk-plan-select');
  sel.innerHTML='<option value="">— Plan laden (optional) —</option>'+plans.map(p=>`<option value="${p.id}" ${p.id==pid?'selected':''}>${p.name}</option>`).join('');
  switchTab('log');
  document.getElementById('modal-workout').classList.add('open');
}

function renderPlans(){
  const list=document.getElementById('plan-list');
  if(!plans.length){list.innerHTML=`<div class="empty-state"><div class="icon">📅</div><p>Noch kein Plan.<br>Erstelle deinen ersten Trainingsplan!</p></div>`;return;}
  list.innerHTML=plans.map(p=>`
    <div class="plan-card">
      <div class="plan-header">
        <div><div class="card-title">${p.name}</div><div class="card-meta">${p.exercises.length} Übungen</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="plan-start-btn" onclick="startFromPlan(${p.id})">▶ Starten</button>
          <button class="btn-icon" onclick="deletePlan(${p.id})">🗑</button>
        </div>
      </div>
      <div class="plan-ex-builder">
        ${p.exercises.length?`
          <div style="display:grid;grid-template-columns:1fr 50px 50px 24px;gap:6px;padding-bottom:6px">
            <span class="col-label" style="text-align:left">Übung</span>
            <span class="col-label">Sätze</span><span class="col-label">Wdh</span><span></span>
          </div>
          ${p.exercises.map(e=>`
            <div class="plan-ex-row">
              <span style="font-size:0.83rem;font-weight:500">${e.name}</span>
              <input type="number" value="${e.sets}" min="1" max="10" oninput="updatePlanEx(${p.id},${e.id},'sets',this.value)">
              <input type="number" value="${e.reps}" min="1" max="30" oninput="updatePlanEx(${p.id},${e.id},'reps',this.value)">
              <button class="btn-icon" onclick="removePlanEx(${p.id},${e.id})">✕</button>
            </div>`).join('')}`
        :`<div style="color:var(--muted);font-size:0.82rem;padding:4px 0">Noch keine Übungen</div>`}
        <button class="add-ex-btn" onclick="addExToPlan(${p.id})">＋ Übung hinzufügen</button>
      </div>
    </div>`).join('');
}

// STATS
function renderStats(){
  const total=workouts.length;
  const now=new Date();
  const thisMonth=workouts.filter(w=>{const d=new Date(w.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  const allEx={};
  workouts.forEach(w=>w.exercises.forEach(e=>{
    if(!e.name) return;
    const key=e.name.toLowerCase();
    const maxKg=Math.max(...e.sets.map(s=>parseFloat(s.kg)||0));
    if(!allEx[key]) allEx[key]={name:e.name,max:0,count:0};
    if(maxKg>allEx[key].max) allEx[key].max=maxKg;
    allEx[key].count++;
  }));
  const totalSets=workouts.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+e.sets.length,0),0);
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Trainings</div><div class="stat-value">${total}</div><div class="stat-sub">gesamt</div></div>
    <div class="stat-card"><div class="stat-label">Diesen Monat</div><div class="stat-value">${thisMonth}</div><div class="stat-sub">Einheiten</div></div>
    <div class="stat-card"><div class="stat-label">Sätze</div><div class="stat-value">${totalSets}</div><div class="stat-sub">gesamt</div></div>
    <div class="stat-card"><div class="stat-label">Übungen</div><div class="stat-value">${Object.keys(allEx).length}</div><div class="stat-sub">verschiedene</div></div>`;
  const sorted=Object.values(allEx).sort((a,b)=>b.max-a.max);
  const maxAll=sorted[0]?.max||1;
  const pl=document.getElementById('exercise-progress-list');
  if(!sorted.length){pl.innerHTML=`<div class="empty-state"><div class="icon">📈</div><p>Trag Übungen ein,<br>um Fortschritt zu sehen.</p></div>`;return;}
  pl.innerHTML=sorted.map(e=>`
    <div class="ep-card">
      <div class="ep-name">${e.name}</div>
      <div class="ep-bar-bg"><div class="ep-bar" style="width:${(e.max/maxAll*100).toFixed(0)}%"></div></div>
      <div class="ep-meta"><span>${e.count}× eingetragen</span><span>Max ${e.max} kg</span></div>
    </div>`).join('');
}

renderLog();
</script>
